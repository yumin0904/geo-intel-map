<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>geo-intel-map</title>
  <!-- Leaflet 1.9.4 CSS (지도 스타일) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- MarkerCluster: 마커 1000개 이상 시 자동 그룹핑 (CLAUDE.md 성능 원칙) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="styles/main.css" />
  <!-- vis-timeline: Cascade 타임라인 패널 (CLAUDE.md 3.4) -->
  <!-- standalone 빌드 = vis-data(DataSet) 포함, 별도 import 불필요 -->
  <link rel="stylesheet" href="https://unpkg.com/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css" />
</head>
<body>
  <!-- 지도가 그려질 div — MapController가 이 id를 사용 -->
  <div id="map"></div>

  <!-- 좌측 사이드바 — LayerPanel이 마운트 -->
  <div id="layer-panel"></div>

  <!-- 분쟁 이벤트 필터 바 (하단 중앙 고정) -->
  <div id="conflict-filter-bar">
    <span class="filter-bar__title">◈ 분쟁 이벤트</span>
    <div class="filter-bar__row">
      <span class="filter-bar__label">심각도</span>
      <input type="range" id="severity-slider" class="severity-slider" min="0" max="100" value="0" step="5" />
      <span id="severity-label" class="filter-bar__value">0 이상</span>
    </div>
    <div class="filter-bar__divider"></div>
    <div class="filter-bar__row">
      <span class="filter-bar__label">기간</span>
      <button class="period-btn is-active" data-days="30">30일</button>
      <button class="period-btn" data-days="7">7일</button>
    </div>
  </div>

  <!-- 우측 상단 정보 패널 -->
  <div class="info-panel">
    <span class="info-title">geo-intel-map</span>
    <span class="info-version">v0.1.0</span>
  </div>

  <!-- 우측 슬라이드인 이론 패널 — TheoryPanel.js가 마운트 -->
  <div id="theory-panel" class="theory-panel"></div>

  <!-- 하단 Cascade 타임라인 패널 — TimelineView.js가 마운트 -->
  <div id="timeline-panel">
    <div class="timeline-panel__header">
      <span class="timeline-panel__title">⛓ CASCADE TIMELINE</span>
      <span class="timeline-panel__count" id="timeline-count">로딩 중…</span>
      <button id="timeline-toggle" class="timeline-panel__toggle">▼</button>
    </div>
    <div id="timeline-vis"></div>
  </div>

  <!-- Leaflet JS (CDN) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <!-- vis-timeline JS — global `vis` 객체(vis.Timeline, vis.DataSet) 노출 -->
  <script src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>

  <!-- 진입점 — Phase 1: LayerManager + LayerPanel / Phase 2: Cascade + Timeline -->
  <script type="module">
    import { MapController }        from './src/core/MapController.js';
    import { MilitaryBasesLayer }   from './src/layers/MilitaryBasesLayer.js';
    import { ConflictEventsLayer }  from './src/layers/ConflictEventsLayer.js';
    import { EnergyPipelinesLayer } from './src/layers/EnergyPipelinesLayer.js';
    import { ChokepointsLayer }      from './src/layers/ChokepointsLayer.js';
    import { SubmarineCablesLayer }  from './src/layers/SubmarineCablesLayer.js';
    import { CascadeLayer }          from './src/layers/CascadeLayer.js';
    import { LayerPanel }           from './src/panels/LayerPanel.js';
    import { TheoryPanel }          from './src/panels/TheoryPanel.js';
    import { TimelineView }         from './src/views/TimelineView.js';

    const ctrl        = new MapController('map').init();
    const bases       = new MilitaryBasesLayer(ctrl.map, ctrl.eventBus);
    const conflict    = new ConflictEventsLayer(ctrl.map, ctrl.eventBus);
    const pipelines   = new EnergyPipelinesLayer(ctrl.map);
    const chokepoints = new ChokepointsLayer(ctrl.map);
    const cables      = new SubmarineCablesLayer(ctrl.map);
    const cascade     = new CascadeLayer(ctrl.map, ctrl.eventBus);

    // 새 레이어 추가 = register() 한 줄로 패널 자동 반영
    ctrl.layerManager.register('military-bases', bases, {
      name: '군사기지',
      icon: '⬡',
      defaultVisible: true,
      filters: [{
        id: 'faction',
        options: [
          { value: 'USA',    label: 'US',  color: '#4a9eff' },
          { value: 'China',  label: 'CN',  color: '#ff4a4a' },
          { value: 'Russia', label: 'RU',  color: '#ffd700' },
          { value: 'Allied', label: 'AL',  color: '#4aff91' },
        ],
        active: ['USA', 'China', 'Russia', 'Allied'],
        onChange: (values) => bases.setFilter(values),
      }],
    });

    ctrl.layerManager.register('conflict-events', conflict, {
      name: '분쟁 이벤트',
      icon: '◈',
      defaultVisible: true,
    });

    ctrl.layerManager.register('energy-pipelines', pipelines, {
      name: '에너지 파이프라인',
      icon: '━',
      defaultVisible: true,
    });

    ctrl.layerManager.register('submarine-cables', cables, {
      name: '해저 광케이블',
      icon: '⌇',
      defaultVisible: true,
    });

    ctrl.layerManager.register('chokepoints', chokepoints, {
      name: '해상 초점',
      icon: '◉',
      defaultVisible: true,
    });

    // ★ Cascade(연쇄 분석) — 분쟁 → 시장 인과 점선 화살표 (Phase 2 핵심 차별 기능)
    ctrl.layerManager.register('cascade', cascade, {
      name: '인과 연쇄',
      icon: '⛓',
      defaultVisible: true,
    });

    const panel = new LayerPanel(ctrl.layerManager, ctrl.eventBus);
    panel.mount('layer-panel');

    const theoryPanel = new TheoryPanel(ctrl.eventBus);
    theoryPanel.mount('theory-panel');

    // Phase 2: Cascade 타임라인 — cascade:loaded 이벤트 구독, 하단 패널에 렌더
    new TimelineView(ctrl.eventBus);

    // ── 분쟁 이벤트 필터 바 핸들러 ──────────────────────────────
    const slider       = document.getElementById('severity-slider');
    const severityLabel = document.getElementById('severity-label');
    const periodBtns   = document.querySelectorAll('.period-btn');

    // 슬라이더: 서버 재요청 없이 클라이언트 필터 (CLAUDE.md 성능 원칙)
    slider.addEventListener('input', () => {
      const val = Number(slider.value);
      severityLabel.textContent = `${val} 이상`;
      conflict.setSeverityMin(val);
    });

    periodBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        periodBtns.forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        conflict.setPeriod(Number(btn.dataset.days));
      });
    });
  </script>
</body>
</html>
