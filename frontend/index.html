<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:,">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>geo-intel-map</title>
  <!-- Leaflet 1.9.4 CSS (지도 스타일) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- MarkerCluster: 마커 1000개 이상 시 자동 그룹핑 (CLAUDE.md 성능 원칙) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="styles/main.css" />
  <!-- vis-timeline: Cascade 타임라인 패널 (CLAUDE.md 3.4) -->
  <!-- standalone 빌드 = vis-data(DataSet) 포함, 별도 import 불필요 -->
  <link rel="stylesheet" href="https://unpkg.com/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css" />
</head>
<body>
  <!-- 지도가 그려질 div — MapController가 이 id를 사용 -->
  <div id="map"></div>

  <!-- 좌측 사이드바 — LayerPanel이 마운트 -->
  <div id="layer-panel"></div>

  <!-- 분쟁 이벤트 필터 바 (하단 중앙 고정) -->
  <div id="conflict-filter-bar">
    <span class="filter-bar__title">◈ 분쟁 이벤트</span>
    <div class="filter-bar__row">
      <span class="filter-bar__label">심각도</span>
      <input type="range" id="severity-slider" class="severity-slider" min="0" max="100" value="0" step="5" />
      <span id="severity-label" class="filter-bar__value">0 이상</span>
    </div>
    <div class="filter-bar__divider"></div>
    <div class="filter-bar__row">
      <span class="filter-bar__label">기간</span>
      <button class="period-btn is-active" data-days="30">30일</button>
      <button class="period-btn" data-days="7">7일</button>
    </div>
  </div>

  <!-- 우측 상단 정보 패널 -->
  <div class="info-panel">
    <span class="info-title">geo-intel-map</span>
    <span id="version-badge" class="info-version">v…</span>
  </div>

  <!-- 우측 슬라이드인 이론 패널 — TheoryPanel.js가 마운트 -->
  <div id="theory-panel" class="theory-panel"></div>
  <!-- Phase 3: 이론 라이브러리 패널 — TheoryLibraryView.js가 마운트 -->
  <div id="library-panel" class="library-panel"></div>
  <!-- Phase 3: 분석실 노드·엣지 캔버스 — SandboxLabView.js가 마운트 -->
  <div id="sandbox-panel" class="sandbox-panel"></div>

  <!-- 우측 하단 Cascade 그래프 패널 — CascadeGraphView.js가 마운트 -->
  <!-- bottom: 44px — 타임라인 헤더 바로 위, z-index 1000 (타임라인 위, 이론패널 아래) -->
  <div id="cascade-graph-panel">
    <div class="cgraph__header">
      <span class="cgraph__title">⬡ CASCADE GRAPH</span>
      <span class="cgraph__count" id="cascade-graph-count">로딩 중…</span>
      <button id="cascade-graph-fit" class="cgraph__btn" title="전체 그래프 보기">⊞ 전체</button>
      <button id="cascade-graph-fullscreen" class="cgraph__btn" title="전체화면 전환">⛶</button>
      <button id="cascade-graph-toggle" class="cgraph__btn">▲</button>
    </div>
    <!-- cgraph__body: 그래프(70%) + 이론 패널(30%) — 전체화면 시 flex-row로 분할 -->
    <div class="cgraph__body">
      <div id="cascade-graph-cy"></div>
      <!-- 전체화면 전용 이론 분석 패널 — 일반 모드에서는 display:none -->
      <div class="cgraph__inner-theory" id="cascade-graph-inner-theory">
        <p class="cgraph__inner-theory-hint">노드를 클릭하면<br>이론 분석이 표시됩니다.</p>
      </div>
    </div>
  </div>

  <!-- 하단 Cascade 타임라인 패널 — TimelineView.js가 마운트 -->
  <div id="timeline-panel">
    <div class="timeline-panel__header">
      <span class="timeline-panel__title">⛓ CASCADE TIMELINE</span>
      <span class="timeline-panel__count" id="timeline-count">로딩 중…</span>
      <button id="timeline-toggle" class="timeline-panel__toggle">▼</button>
    </div>
    <!-- 날짜 이동 툴바 — 패널 열릴 때만 보임(overflow:hidden) -->
    <div class="timeline-panel__toolbar">
      <select id="tl-year"  class="tl-select"></select><span class="tl-sep">년</span>
      <select id="tl-month" class="tl-select"></select><span class="tl-sep">월</span>
      <select id="tl-day"   class="tl-select"></select><span class="tl-sep">일</span>
      <button id="tl-goto" class="tl-btn">이동</button>
      <button id="tl-fit"  class="tl-btn tl-btn--fit">📅 데이터 보기</button>
    </div>
    <div id="timeline-vis"></div>
  </div>

  <!-- Leaflet JS (CDN) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <!-- vis-timeline JS — global `vis` 객체(vis.Timeline, vis.DataSet) 노출 -->
  <script src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <!-- Cytoscape.js — Cascade 인과 그래프 뷰 (CLAUDE.md 3.4) -->
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
  <!-- Cytoscape Dagre 레이아웃 — Sandbox Lab 계층형 그래프 (Phase 3) -->
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.4.0/cytoscape-dagre.min.js"></script>
  <!-- marked.js — 이론 라이브러리 상세 뷰 마크다운 렌더링 (Phase 3) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

  <!-- 진입점 — Phase 1: LayerManager + LayerPanel / Phase 2: Cascade + Timeline -->
  <script type="module">
    import { MapController }        from './src/core/MapController.js';
    import { MilitaryBasesLayer }   from './src/layers/MilitaryBasesLayer.js';
    import { ConflictEventsLayer }  from './src/layers/ConflictEventsLayer.js';
    import { EnergyPipelinesLayer } from './src/layers/EnergyPipelinesLayer.js';
    import { ChokepointsLayer }      from './src/layers/ChokepointsLayer.js';
    import { SubmarineCablesLayer }  from './src/layers/SubmarineCablesLayer.js';
    import { CascadeLayer }          from './src/layers/CascadeLayer.js';
    import { FireHotspotsLayer }     from './src/layers/FireHotspotsLayer.js';
    import { NavalLayer }            from './src/layers/NavalLayer.js';
    import { AdsbLayer }             from './src/layers/AdsbLayer.js';
    // SanctionsLayer: 지도 토글 제거, 라이브러리 아카이브(asset_type:norm)로 이전
    // GdeltLayer: ConflictEventsLayer에 내부 통합됨 — 별도 등록 불필요
    import { LayerPanel }           from './src/panels/LayerPanel.js';
    import { TheoryPanel }          from './src/panels/TheoryPanel.js';
    import { NotebookPanel }        from './src/panels/NotebookPanel.js';
    import { TimelineView }         from './src/views/TimelineView.js';
    import { CascadeGraphView }     from './src/views/CascadeGraphView.js';
    import { TheoryLibraryView }    from './src/views/TheoryLibraryView.js';
    import { SandboxLabView }       from './src/views/SandboxLabView.js';
    import { api }                  from './src/services/api.js';

    // 우상단 버전 뱃지를 백엔드 config/version.json 기준으로 동적 표시
    api.get('/api/version')
      .then(({ version, phase }) => {
        document.getElementById('version-badge').textContent = `v${version} · Phase ${phase}`;
      })
      .catch(() => {
        document.getElementById('version-badge').textContent = 'v? (offline)';
      });

    const ctrl        = new MapController('map').init();
    const bases       = new MilitaryBasesLayer(ctrl.map, ctrl.eventBus);
    const conflict    = new ConflictEventsLayer(ctrl.map, ctrl.eventBus);
    const pipelines   = new EnergyPipelinesLayer(ctrl.map);
    const chokepoints = new ChokepointsLayer(ctrl.map);
    const cables      = new SubmarineCablesLayer(ctrl.map);
    const cascade     = new CascadeLayer(ctrl.map, ctrl.eventBus);
    const fire        = new FireHotspotsLayer(ctrl.map, ctrl.eventBus);
    const naval       = new NavalLayer(ctrl.map, ctrl.eventBus);
    const adsb        = new AdsbLayer(ctrl.map, ctrl.eventBus);

    // 새 레이어 추가 = register() 한 줄로 패널 자동 반영
    ctrl.layerManager.register('military-bases', bases, {
      name: '군사기지',
      icon: '⬡',
      defaultVisible: true,
      filters: [{
        id: 'faction',
        options: [
          { value: 'USA',    label: 'US',  color: '#4a9eff' },
          { value: 'China',  label: 'CN',  color: '#ff4a4a' },
          { value: 'Russia', label: 'RU',  color: '#ffd700' },
          { value: 'Allied', label: 'AL',  color: '#4aff91' },
        ],
        active: ['USA', 'China', 'Russia', 'Allied'],
        onChange: (values) => bases.setFilter(values),
      }],
    });

    ctrl.layerManager.register('conflict-events', conflict, {
      name: '분쟁 이벤트',
      icon: '◈',
      defaultVisible: true,
    });

    ctrl.layerManager.register('energy-pipelines', pipelines, {
      name: '에너지 파이프라인',
      icon: '━',
      defaultVisible: true,
    });

    ctrl.layerManager.register('submarine-cables', cables, {
      name: '해저 광케이블',
      icon: '⌇',
      defaultVisible: true,
    });

    ctrl.layerManager.register('chokepoints', chokepoints, {
      name: '해상 초점',
      icon: '◉',
      defaultVisible: true,
    });

    // ★ Cascade(연쇄 분석) — 분쟁 → 시장 인과 점선 화살표 (Phase 2 핵심 차별 기능)
    ctrl.layerManager.register('cascade', cascade, {
      name: '인과 연쇄',
      icon: '⛓',
      defaultVisible: true,
    });

    // ★ 실시간 위성 화재/열점 — VIIRS S-NPP NRT (Phase 2 실시간 레이어 1번)
    // defaultVisible: false — 레이어 패널에서 수동으로 켜야 함 (초기 로드 비용 절감)
    ctrl.layerManager.register('fire-hotspots', fire, {
      name: '화재/열점',
      icon: '🔥',
      defaultVisible: false,
    });

    // ★ 실시간 선박 AIS — AISStream.io (Phase 2 실시간 레이어 2번)
    // 호르무즈·바브엘만데브·말라카·대만해협·남중국해 초크포인트 선박 추적
    // defaultVisible: false — 45초 수집 지연 있음, 수동 활성화
    ctrl.layerManager.register('naval', naval, {
      name: '선박 (AIS)',
      icon: '⚓',
      defaultVisible: false,
    });

    // ★ 실시간 군용기 ADS-B — OpenSky Network (Phase 2 실시간 레이어 3번)
    // 대만해협·남중국해·동중국해 군용기 (ISR·폭격기·급유기 포함)
    // cascade 룰 taiwan_strait_to_tsm · taiwan_strait_to_soxx 트리거 소스
    // defaultVisible: false — OpenSky 크레딧 절약, 수동 활성화
    ctrl.layerManager.register('adsb', adsb, {
      name: '군용기 (ADS-B)',
      icon: '✈',
      defaultVisible: false,
    });

    const panel = new LayerPanel(ctrl.layerManager, ctrl.eventBus);
    panel.mount('layer-panel');

    const theoryPanel = new TheoryPanel(ctrl.eventBus);
    theoryPanel.setNotebook(new NotebookPanel());
    theoryPanel.mount('theory-panel');

    // Phase 2: Cascade 타임라인 — cascade:loaded 이벤트 구독, 하단 패널에 렌더
    new TimelineView(ctrl.eventBus);

    // Phase 2: Cascade 그래프 뷰 — cascade:loaded 재사용, marker:click 연동
    new CascadeGraphView(ctrl.eventBus);

    // Phase 3: 이론 라이브러리 뷰 — library:toggle 이벤트로 열기/닫기
    new TheoryLibraryView(ctrl.map, ctrl.eventBus, ctrl.layerManager);

    // Phase 3: Sandbox Lab 뷰 — sandbox:toggle 이벤트로 열기/닫기
    new SandboxLabView(ctrl.map, ctrl.eventBus);

    // ── 분쟁 이벤트 필터 바 핸들러 ──────────────────────────────
    const slider       = document.getElementById('severity-slider');
    const severityLabel = document.getElementById('severity-label');
    const periodBtns   = document.querySelectorAll('.period-btn');

    // 슬라이더: 서버 재요청 없이 클라이언트 필터 (CLAUDE.md 성능 원칙)
    slider.addEventListener('input', () => {
      const val = Number(slider.value);
      severityLabel.textContent = `${val} 이상`;
      conflict.setSeverityMin(val);
    });

    periodBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        periodBtns.forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        conflict.setPeriod(Number(btn.dataset.days));
      });
    });
  </script>
</body>
</html>
