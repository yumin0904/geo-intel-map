<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>geo-intel-map</title>
  <!-- Leaflet 1.9.4 CSS (지도 스타일) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <!-- 지도가 그려질 div — MapController가 이 id를 사용 -->
  <div id="map"></div>

  <!-- 좌측 사이드바 — LayerPanel이 마운트 -->
  <div id="layer-panel"></div>

  <!-- 우측 상단 정보 패널 -->
  <div class="info-panel">
    <span class="info-title">geo-intel-map</span>
    <span class="info-version">v0.1.0</span>
  </div>

  <!-- Leaflet JS (CDN) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- 진입점 — Phase 1: LayerManager + LayerPanel -->
  <script type="module">
    import { MapController }      from './src/core/MapController.js';
    import { MilitaryBasesLayer } from './src/layers/MilitaryBasesLayer.js';
    import { LayerPanel }         from './src/panels/LayerPanel.js';

    const ctrl  = new MapController('map').init();
    const bases = new MilitaryBasesLayer(ctrl.map);

    // 새 레이어 추가 = register() 한 줄 추가만으로 패널에 자동 반영
    ctrl.layerManager.register('military-bases', bases, {
      name: '군사기지',
      icon: '⬡',
      defaultVisible: true,
      filters: [{
        id: 'faction',
        options: [
          { value: 'USA',    label: 'US',  color: '#4a9eff' },
          { value: 'China',  label: 'CN',  color: '#ff4a4a' },
          { value: 'Russia', label: 'RU',  color: '#ffd700' },
          { value: 'Allied', label: 'AL',  color: '#4aff91' },
        ],
        active: ['USA', 'China', 'Russia', 'Allied'],
        onChange: (values) => bases.setFilter(values),
      }],
    });

    const panel = new LayerPanel(ctrl.layerManager, ctrl.eventBus);
    panel.mount('layer-panel');
  </script>
</body>
</html>
