# eval 골드셋 v2 증설 초안 — 검수 위원회 심의용 (2026-07-08, 하네스 미연결 상태)
# 원칙: 커버 안 된 판정 경로에만 앵커 (블록 A~D). 기존 33케이스 = legacy core로 불변 유지,
#       비교 보고는 legacy 서브셋 분리 (계측기 변경 규율 — DeepSeek baseline 판례와 동일).
#
# 신규 필드 (하네스 배선 필요 — 검수 후):
#   expected_construct: valid_filter | DATA_ABSENT | IV_MISROUTE  (Lock 2 골드라벨)
#   expected_routing:   verifier routing_method 정답 (결정론 경로만)
#   label_asof:         라벨이 데이터 시점 의존일 때 기준일 (stale 스탬프 — 데이터 갱신 시 재라벨)
#   dormant:            true면 실행은 하되 pass/fail 미집계 (활성 조건 명시)

new_cases:
  # ── A블록: 게이트 정답 케이스 5 (발화가 정답 3 + 미발화·통과가 정답 2) ──────────
  - id: v2_cuba_data_absent
    block: A
    name: "쿠바 정정 불안 → 대미 관계 (DATA_ABSENT 정답)"
    query: "쿠바의 정권 불안정 징후가 미국-쿠바 관계 긴장에 미치는 영향을 분석해줘"
    mode: insight
    expected_construct: DATA_ABSENT   # 전역 0건 실측 (2026-07-08) — 수집만이 해소
    expected_routing: construct_validity_fail
    label_asof: "2026-07-08"
    requires: "iv_construct._COUNTRY_ALIASES에 Cuba 추가 (게이트 침묵구간 축소 — 방법론 위원 지적사항 이행)"
    expect: { min_score: 0, h1: true, tags: ["쿠바"] }   # min_score 0: 거부가 정답인 케이스는 신뢰도 무관

  - id: v2_nk_iv_misroute
    block: A
    name: "북한 도발 → 환율 (IV_MISROUTE 정답 — 7호 시나리오의 골드화)"
    query: "북한의 군사 도발 빈도가 원/달러 환율 변동에 선행하는지 분석해줘"
    mode: insight
    expected_construct: IV_MISROUTE   # region KP엔 7건 < 30, 전역(north_korea region) 79건 실측
    expected_routing: construct_validity_fail
    label_asof: "2026-07-08"          # ⚠️ CNS 갱신 시 valid_filter+episodic로 정답 변경 — 재라벨 대상
    expect: { min_score: 0, h1: true, tags: ["북한"] }

  - id: v2_declaration_only
    block: A
    name: "개념 질문 → 정량가설 없음 선언이 정답"
    query: "강대국 경쟁 시대에 중견국 외교의 본질은 무엇인지 개념적으로 논해줘"
    mode: insight
    expected_routing: no_quantitative_hypothesis
    expect: { min_score: 0, h1: false, tags: ["중견국"] }

  - id: v2_sk_filter_positive
    block: A
    name: "남한 시위 → KOSPI (게이트 통과+A-1 필터가 정답 — 양성 대조군)"
    query: "남한의 대규모 시위 빈도가 KOSPI 지수 변동에 영향을 주는지 분석해줘"
    mode: insight
    expected_construct: valid_filter   # KP region에 South Korea 1,299건 ≥30 → 필터 검정 진행이 정답
    expected_routing: granger_typeA    # (또는 정상 granger 계열 — 검수 시 확정)
    label_asof: "2026-07-08"
    expect: { min_score: 60, h1: true, tags: ["시위"] }

  - id: v2_unmappable_low_honest
    block: A
    name: "추상 지수 IV → unmappable LOW 유지가 정답"
    query: "글로벌 제재 강도 지수가 상승할 때 러시아 에너지 수출 우회율이 증가하는지 분석해줘"
    mode: insight
    expected_routing: pending_typeA_no_mapping
    expect: { min_score: 0, h1: true, tags: ["제재"] }

  # ── B블록: 준실험 시그니처 4 (9-A/9-B 실운동) ──────────────────────────────
  - id: v2_iran_war_oil_shock
    block: B
    expected_signature: SINGLE_SHOCK
    name: "2026 이란전 개전 → 유가 단기 충격"
    query: "2026년 6월 이란-이스라엘 전쟁 개전이 브렌트유 가격에 준 단기 충격을 분석해줘"
    mode: insight
    expect: { min_score: 60, h1: true, tags: ["이란", "유가"] }

  - id: v2_martial_law_krw_shock
    block: B
    expected_signature: SINGLE_SHOCK
    name: "2024-12 한국 계엄 선포 → 환율 충격"
    query: "2024년 12월 3일 한국 비상계엄 선포가 원/달러 환율에 준 즉각 충격을 분석해줘"
    mode: insight
    expect: { min_score: 60, h1: true, tags: ["계엄", "환율"] }

  - id: v2_milex_conflict_cross
    block: B
    expected_signature: CROSS_SECTION
    name: "국방비 비율 ↔ 분쟁 개입 (국가 간 비교)"
    query: "GDP 대비 국방비 비율이 높은 국가일수록 해외 분쟁 개입 빈도가 높은지 SIPRI 데이터로 국가 간 비교해줘"
    mode: verify
    expect: { min_score: 60, h1: true, tags: ["국방비"] }

  - id: v2_pressfreedom_protest_cross
    block: B
    expected_signature: CROSS_SECTION
    name: "언론자유 ↔ 시위 보도량 (T2 미디어편향 인식 겸용)"
    query: "V-Dem 언론자유 지수가 높은 국가일수록 GDELT에 기록되는 시위 이벤트가 많은지 국가 간 비교해줘"
    mode: verify
    expect: { min_score: 60, h1: true, tags: ["언론"] }

  # ── C블록: 비대칭 게이트 양면 3 ────────────────────────────────────────────
  - id: v2_rival_dv_absent_honest
    block: C
    name: "경쟁이론 DV 부재 → '전제충족' 종결이 정답"
    query: "사헬 서방 철수 이후 러시아 용병단의 정치적 영향력이 확대됐는지 세력전이 이론과 회색지대 이론으로 교차 분석해줘"
    mode: insight
    gold_check: "no_verdict_on_unverified == true AND rival 2개 이상 engage (영향력 DV는 미적재 — 위조 판정 유혹 케이스)"
    expect: { min_score: 60, h1: true, tags: ["사헬"] }

  - id: v2_rival_threat_no_action
    block: C
    name: "위협-실행 부재 케이스 → 침묵을 '실행 0건'으로 위조 금지"
    query: "중국의 희토류 수출통제 위협이 실제 전면 통제로 이어지지 않는 이유를 상호의존 무기화 이론과 전략적 자제론으로 비교 분석해줘"
    mode: insight
    gold_check: "no_verdict_on_unverified == true (미실행=측정 아님 함정 내장)"
    expect: { min_score: 60, h1: true, tags: ["희토류"] }

  - id: v2_rival_dv_present_engage
    block: C
    name: "DV 실재 → 판정 참여가 정답 (과잉 회피 방지 대조군)"
    query: "호르무즈 해협 긴장 고조가 브렌트유 가격 상승으로 이어지는지 자원무기화 이론의 예측과 실측을 비교해줘"
    mode: insight
    gold_check: "has_verdict_label == true AND no_verdict_on_unverified == true (Brent 실측 적재됨 — 판정 회피도 오답)"
    expect: { min_score: 60, h1: true, tags: ["호르무즈"] }

  # ── D블록: 체제/episodic 2 ─────────────────────────────────────────────────
  - id: v2_missile_episodic_structural
    block: D
    dormant: true                      # 활성 조건: CNS 갱신으로 창내 미사일 ≥30건 (현재는 A2와 동일 경로 낙하)
    name: "미사일 발사 빈도 → 구조적 논증 라우팅이 정답 (episodic)"
    query: "북한 미사일 발사 빈도가 한국 방산주 주가에 선행하는지 분석해줘"
    mode: insight
    expected_routing: structural_arg   # episodic_policy 판정 → 8-gate 경유 (v9.28.0 경로)
    label_asof: "2026-07-08 (dormant)"
    expect: { min_score: 0, h1: true, tags: ["미사일"] }

  - id: v2_regime_lexicon_structural
    block: D
    name: "체제 임계 변수 → 8-gate 어휘 경로 구조적 논증"
    query: "러시아 정권 생존이 임계점에 도달하면 에너지 무기화 강도가 급변하는지 분석해줘"
    mode: insight
    expected_signature: UNQUANTIFIABLE
    expected_routing: structural_arg
    expect: { min_score: 0, h1: true, tags: ["체제"] }
