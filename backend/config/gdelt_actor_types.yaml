# backend/config/gdelt_actor_types.yaml
#
# GDELT/CAMEO 행위자 유형(Actor*Type1Code) 필터 — "정치·무력 행위자 쌍" 정의.
#
# ── 왜 필요한가 (구성 타당도 결함 실측, 2026-07-13 엔진수리위) ──────────────────
# CAMEO 자동 코더는 신문 문장의 동사를 기계적으로 코딩한다. 스포츠 기사가
# 물리적 충돌(QuadClass=4)로 오탐되는 것이 대표 병리다:
#   BigQuery 실측 — ActionGeo_CountryCode='MN'(모나코)의 2026-06 QuadClass=4
#   이벤트 279건은 **전부 포뮬러 1 모나코 그랑프리 기사**였다.
#   ("MONACO vs POLE"=폴 포지션, "MONTREAL vs MONACO"=서킷 비교, 행위자 MONEGASQUE.
#    출처: formula1.com · motorsport.com · planetf1.com · crash.net)
#   → 발생지 키로 바꾸는 것만으로는 안 고쳐진다. 행위자 유형이 두 번째 자물쇠다.
#
# ── 필터 정의 ────────────────────────────────────────────────────────────────
# actor1(가해·발신 행위자)은 국가기구 또는 무장조직이어야 하고,
# actor2(대상 행위자)는 거기에 민간인(CVL)까지 허용한다 — 국가의 대민 폭력
# (진압·공습)이 분쟁의 핵심 유형이라 CVL을 피해자 쪽에서 배제하면 신호가 죽는다.
# 스포츠팀·기업·연예인은 어느 쪽에도 없다 → 오탐이 떨어진다.
#
# ── 실측 (2026-06, QuadClass=4, 발생지 키) ───────────────────────────────────
#   국가(FIPS)      원본     필터후   잔존
#   이스라엘 IS     45,002   1,553    3.5%
#   우크라이나 UP   30,999   1,065    3.4%
#   남한 KS          2,829     138    4.9%
#   북한 KN            797      48    6.0%
#   모나코 MN          279       2    0.7%   ← F1 오탐 소거
#   룩셈부르크 LU      208       0    0%
#   바티칸 VT           76       1    1.3%
# 소국 잡음 99%+ 소거, 전쟁국 신호 유지 = 구성 타당도 개선의 증거.
#
# ── 정직성 규약 (필수) ───────────────────────────────────────────────────────
# 이 필터는 **원본을 대체하지 않는다.** 로더는 원본 카운트와 필터 카운트를
# 둘 다 적재한다(n_material_conflict vs n_material_conflict_pol). 필터가 과했는지는
# 데이터가 말해야 한다 — 우크라이나도 96.6%가 떨어지며, 그 96.6%에 진짜 사건이
# 얼마나 섞였는지는 열어봐야 안다. 소비자는 어느 쪽을 썼는지 명시할 의무가 있다.
#
# ⚠️ 시위(EventRootCode=14)에는 이 필터를 그대로 쓰지 마라 — 시위 행위자는 통상
#    CVL·OPP·민간이라 actor1 국가기구 요구가 시위 신호 자체를 죽인다. 로더는
#    n_protest_pol을 참고용으로 함께 적재하지만, 시위 소비자의 기본값은 원본이다
#    (발생지 키 전환만으로 시위의 위치 오염은 이미 해소된다).
#
# CAMEO Type1Code 사전: http://data.gdeltproject.org/documentation/CAMEO.Manual.1.1b3.pdf

material_conflict_filter:
  # actor1 — 국가기구·무장조직만
  actor1_types: [GOV, MIL, COP, REB, INS, SEP, OPP, SPY]
  # actor2 — 위 + 민간인(국가의 대민 폭력을 보존)
  actor2_types: [GOV, MIL, COP, REB, INS, SEP, OPP, SPY, CVL]
