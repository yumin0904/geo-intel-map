# backend/config/fips_iso3.yaml
#
# FIPS 10-4 2자리 국가코드 → ISO 3166-1 alpha-3 크로스워크.
#
# 왜 필요한가:
#   GDELT `ActionGeo_CountryCode`(사건 발생지)는 **FIPS 10-4** 2자리를 쓰고,
#   하류 소비자(observation_ledger.series_key · panel_regression의 World Bank·V-Dem·
#   SIPRI 조인)는 **ISO3**를 쓴다. 이 파일이 그 사이의 유일한 번역표다.
#   (CAMEO `Actor1CountryCode`는 3자리로 대체로 ISO3와 일치 — 그쪽은 매핑 불필요.)
#
# 헌법 §7 "매직 넘버 금지 → config/로 추출": 로더(scripts/load_gdelt_bq.py)는
#   이 파일을 읽을 뿐 코드에 매핑을 하드코딩하지 않는다.
#
# 출처(provenance):
#   GeoNames countryInfo.txt (public domain, CC BY 4.0)
#   https://download.geonames.org/export/dump/countryInfo.txt — 열 1=ISO2, 2=ISO3, 4=FIPS
#   내려받은 날: 2026-07-13. 자동 추출 249행 + 수기 보충 1행(아래 supplement).
#
# 미매핑 처리 규약:
#   여기에 없는 FIPS 코드(해양·무국적 지오코딩 등)는 **버리지 않는다** —
#   gdelt_geo_country_daily에 원본 fips를 그대로 두고 country_iso3만 NULL로 적재한다.
#   (삼킴 금지: 미매핑량은 로더가 로그로 보고한다.)
#
# YAML 1.1 불리언 함정: FIPS "NO"(노르웨이)·"ON"류는 따옴표 없으면 False로 파싱된다
#   → 모든 키를 따옴표로 감싼다.
#
# 검증: 재적재 후 `SELECT SUM(n_total) FROM gdelt_geo_country_daily WHERE country_iso3 IS NULL`
#   이 전체 대비 몇 %인지 확인 — 급증하면 GDELT가 새 코드를 쓰기 시작했다는 뜻.

