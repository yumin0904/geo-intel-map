  # ── 수기 보충 (GeoNames 미수록 FIPS 10-4 코드) ─────────────────────────────
  # GeoNames는 팔레스타인을 PS/WE 1행으로만 싣는다. FIPS 10-4는 가자지구(GZ)와
  # 서안(WE)을 별도 코드로 나누고 GDELT는 둘 다 발화한다. ISO 3166은 둘을 PSE
  # 하나로 접으므로 GZ→PSE를 보충한다 (다대일 매핑 — 그래서 이 테이블의 행 키는
  # iso3가 아니라 fips다. 소비자는 iso3로 GROUP BY·SUM 해야 한다).
  "GZ": PSE    # Gaza Strip (FIPS 10-4)

  # 세르비아 이중코드 — 1차 적재 미매핑 실측(1,624,452건)에서 발견.
  # GDELT는 세르비아를 두 코드로 발화한다: GeoNames 계열 "RI"(도시급 지오코딩)와
  # CIA GEC 계열 "RB"(국가급 지오코딩). 좌표로 실증 — RB 전건이 정확히
  # (44.82, 20.47) = 베오그라드 한 점에 고정(분산 0 = 국가 중심점), RI는 도시별 분산.
  # 둘 다 SRB. 매핑을 빠뜨렸으면 세르비아 관측량의 절반(1.6M건)이 통째로 NULL이 됐다.
  # → 이 역시 다대일(RI·RB → SRB). 소비자의 iso3 GROUP BY·SUM 의무가 여기서도 발생.
  "RB": SRB    # Serbia (CIA GEC 국가급 코드 — 좌표 실측 2026-07-13)

# ── 의도적 미매핑 (국가가 아니라 NULL이 정직한 코드들 — 원본 fips는 보존) ──────
#   OS  Oceans        564k건 · bbox 전지구(lat −75~85, lon −175~175) — 공해
#   OC  Oceans(인도양) 56k건 · bbox 전지구 — 공해
#   PG  Spratly Is.     8k건 · centroid (10.3, 114.8) 남중국해 — 주권 분쟁, ISO3 없음
#   PF  Paracel Is.     4k건 · 주권 분쟁, ISO3 없음
#   WQ·HQ·JQ·LQ·JN     각 <1.3k건 · 미국 군소 도서·얀마옌 — ISO3 없음
# 좌표 실측 2026-07-13. 국가 패널에 조인될 수 없는 지물이라 NULL이 정직하다.
# ⚠️ PG(스프래틀리)는 남중국해 분석에 실질 의미가 있으나 국가 귀속이 분쟁 중이므로
#    자의적 귀속을 거부한다 — 필요 시 fips='PG'로 직접 조회할 것(원본 보존됨).
# ⚠️ YI(SCG, 세르비아-몬테네그로)는 폐지된 ISO3라 World Bank·V-Dem 패널 조인에서
#    자연 탈락한다 — 삼킴이 아니라 소멸한 국가의 정직한 귀결. SRB로 접지 않는다.
