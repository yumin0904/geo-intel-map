# theory_library.yaml — 이론 ID ↔ 지도 포커스 매핑 (CLAUDE.md 5대 섹터 커버)
#
# 각 항목은 두 방향의 탐색을 지원한다:
#   Forward : theory_id  → MapFocusTarget (이론 카드 클릭 → 지도 이동)
#   Reverse : region_code → [theory_id, ...] (지도 지역 클릭 → 관련 이론 목록)
#
# map_focus.layers : 해당 이론을 볼 때 활성화를 권장하는 레이어 ID 목록
#   → LayerManager에 등록된 키(CLAUDE.md 섹션 5 아키텍처)와 일치해야 한다.
# map_focus.zoom   : 1(전세계) ~ 10(항구 수준). 지역 이론 5~6, 초크포인트 7~8.
# related_regions  : regions.yaml 키와 반드시 일치해야 한다.

# ── 1. 해양 초점주의 & SLOC ───────────────────────────────────────────────────

- theory_id: maritime_mahan_sea_power
  display_name: "마한의 해양력 이론"
  sector_tag: maritime
  map_focus:
    lat: 3.0
    lon: 100.5
    zoom: 5
    # 해상 교통로·군사 기지 레이어가 마한 이론을 가장 직관적으로 보여준다
    layers:
      - submarine-cables
      - military-bases
      - naval
    region_code: malacca
  related_regions:
    - malacca
    - taiwan_strait
    - south_china_sea
    - hormuz
    - indian_ocean   # regions.yaml에 미정의 시 deep_link.py가 경고 후 스킵

- theory_id: maritime_chokepoint_sloc
  display_name: "SLOC 통제 이론 (초크포인트)"
  sector_tag: maritime
  map_focus:
    lat: 12.6
    lon: 43.3
    zoom: 6
    layers:
      - chokepoints
      - naval
    region_code: bab_el_mandeb
  related_regions:
    - bab_el_mandeb
    - hormuz
    - malacca
    - suez

