    sectors: [nuclear, missile, coal, seafood, financial, shipping]
    description: "가장 포괄적인 UN 다자 제재 레짐. 핵·미사일 프로그램 억제 목적. 석탄·수산물 수출 전면 금지, 원유 수입 상한제 포함."
