# 5대 섹터 관련 제재를 중심으로 큐레이션.
# asset_type: norm (통합 라이브러리 분류 기준)
# 학습 목적 이론: Weaponized Interdependence (Farrell & Newman 2019)
#                 Economic Coercion (Drezner 2011)

regimes:
