- id: malacca_to_lng
  name: "말라카 해협 위협 → LNG 선물(NG=F) 상승"
  trigger:
    source_type: conflict       # 말라카는 해적·비국가 위협이 주 — conflict 타입 사용
    region: malacca
    severity_min: 40            # 말라카는 소규모 해적도 글로벌 LNG 가격에 영향 → 낮은 임계치
  expected_response:
    source_type: market
    ticker: "NG=F"             # Henry Hub 천연가스 선물. LNG 직접 선물 없어 근사치
    direction: up
    window_hours: 48
    threshold_pct: 1.0
  chainable: true
  chain_output: "lng_price_spike"
  next_rule_hint: "lng_spike_to_south_korea_energy_cost"
  theory:
    framework: "SLOC Theory (Mahan) / LNG Supply Chain Chokepoint"
    reference: "Mahan 'The Influence of Sea Power' (1890), IEA LNG 시장 보고서 (2023)"
    learning_note: >-
      말라카 해협은 글로벌 LNG 해상 물동량의 약 40%가 통과하는 에너지 동맥이다.
      특히 한국·일본·중국의 LNG 수입 의존도가 높아 말라카 차단 시 동북아 에너지 가격에
      즉각 파장이 온다. 해적 공격·소규모 분쟁도 항로 우회 위험을 높여 보험료·운임을 끌어올린다.
      Mahan이 주목한 '좁은 목(chokepoint)'의 전략적 가치는 현대 LNG 공급망에서도 그대로 유효하다.
      남중국해 룰(south_china_sea_to_lng)과 비교하면 '초크포인트 vs 분쟁 수역'의 가격 전달 차이를 관찰 가능.

- id: food_price_spike_to_tip
  name: "식량가격 급등 → 물가연동채(TIP) 상승"
  # D2 체인: ukraine_conflict_to_wheat → food_price_spike → inflation (TIP)
  # oil_spike_to_inflation과 구조가 동일하지만 충격 원인이 다름:
  #   유가→인플레이션(에너지비용 상승) vs 식량가격→인플레이션(소비자물가 직접 압박)
  trigger:
    source_type: market
    chain_input: "food_price_spike"   # ukraine_conflict_to_wheat의 chain_output
  expected_response:
    source_type: market
    ticker: "TIP"
    direction: up
    window_hours: 96            # 식량가격 상승 → CPI 반영 → 시장 인플레이션 기대는 3~4거래일
    threshold_pct: 0.2          # TIP 변동성 낮음
  chainable: true
  chain_output: "inflation_pressure"
  next_rule_hint: "inflation_to_fed_rate"
  theory:
    framework: "Food Security → CPI Transmission"
    reference: "IMF WEO (2022) 식량가격 인플레이션, Patel & Moore (2009)"
    learning_note: >-
      우크라이나 전쟁으로 밀·해바라기유 가격이 급등하면 글로벌 CPI의 식품 항목(비중 ~15~30%)이
      직접 상승한다. TIP(물가연동채) 상승은 시장이 미래 인플레이션을 반영하는 신호다.
      oil_spike_to_inflation과 달리 이 체인은 '에너지 비용'이 아닌 '식품 직접 가격'이 인플레를 유발하는
      경로로, 개도국·식량수입국에서 충격이 더 크게 나타난다(아랍의 봄 선행지표 역할).
      두 인플레이션 경로(에너지·식량)를 비교 관찰하면 지정학 충격의 소비자 전달 메커니즘을 이해하게 된다.

- id: risk_off_to_qqq_drop
  name: "리스크오프(안전자산 선호) → 나스닥(QQQ) 하락"
  # D2 체인: middle_east_conflict_to_gold → risk_off_sentiment → QQQ↓
  # gold↑ (safe haven)와 QQQ↓ (위험자산 매도)는 같은 'risk-off' 국면의 양면
  trigger:
    source_type: market
    chain_input: "risk_off_sentiment"   # middle_east_conflict_to_gold의 chain_output
  expected_response:
    source_type: market
    ticker: "QQQ"              # Invesco 나스닥100 ETF — 고베타 기술주, 리스크오프에 가장 민감
    direction: down
    window_hours: 48           # 금↑과 QQQ↓의 동시 발화는 1~2 거래일
    threshold_pct: 0.5         # QQQ는 금보다 변동 크므로 임계치 낮게 유지
  chainable: false             # 체인 종점
  chain_output: "tech_sector_selloff"
  theory:
    framework: "Risk-off / Safe Haven Rotation"
    reference: "Baur & Lucey (2010), Fama & French (1993) 리스크 팩터 이론"
    learning_note: >-
      지정학 위기에서 투자자는 고위험자산(주식, 특히 기술주)을 팔고 안전자산(금, 국채)으로 이동한다.
      이 '리스크오프 로테이션'은 중동 분쟁(금↑) → 나스닥 기술주(QQQ↓) 연결로 관찰된다.
      QQQ는 나스닥100 중 애플·마이크로소프트·엔비디아 등 고밸류에이션 기술주 비중이 커서
      시장 불안 심리에 가장 먼저 매도 압력을 받는다.
      middle_east_conflict_to_gold와 함께 보면 '분쟁 → 리스크오프 → 시장 전반 재편' 전체 경로를 추적 가능.
