  # korean_tension_to_kospi는 chain_input 룰 — 이 룰이 krw_depreciation을 먼저 생성해야 체인이 발화
  # sev=35: 무력 충돌/원격폭력 기준 (DB 실측: sev≥35는 19건, sev≥50는 1건)
