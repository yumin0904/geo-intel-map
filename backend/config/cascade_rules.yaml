    learning_note: >-
      한반도 긴장 고조 시 외국인 투자자는 원화 자산을 달러로 전환한다('원화 약세 포지션').
      한국은 GDP 대비 무역의존도 80%+, 외국인 주식 보유 비중 ~30%로 지정학 충격에
      구조적으로 취약하다. 이 룰은 north_korea_missile_to_krw(북한 직접 도발)보다 넓은 범위,
      즉 한반도 전역의 군사적 긴장이 외환시장에 미치는 영향을 포착한다.
      krw_depreciation 신호 생성 → korean_tension_to_kospi 체인이 자동 발화됨.

