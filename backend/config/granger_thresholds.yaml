# Granger 검정 임계값 설정 (9-P-2: 매직넘버 단일 진실 공급원)
# 변경 시 이 파일만 수정 — 코드 내 하드코딩 금지

# 최소 관측값 임계 (D4_INSUFFICIENT 진단 기준)
min_event_obs: 20          # 이벤트 시계열 최소 관측값
min_market_obs: 20         # 시장 시계열 최소 관측값
min_event_event_obs: 30    # 사건→사건 검정 최소 관측값 (양쪽 지역 모두)
min_extreme_obs: 20        # P90 극단 시리즈 최소 관측값
d4_insufficient_threshold: 40  # 이 미만이면 D4(데이터 부족) 진단 — 8-F 전용
                               # ⚠️ 이것은 시계열의 **달력 칸 수**(n_obs)를 센다. 정보량이 아니다.
                               #    아래 min_informative_days가 진짜 게이트다 — 함께 읽을 것.

# ── 정보량 게이트 (G2 — 권역위 2026-07-14, 사용자 승인) ─────────────────────
# 배경: d4_insufficient_threshold(40)는 달력 칸을 센다. 그런데 correlation.py의 sparse 가드가
#   비제로일 10 미만인 계열을 **주간 리샘플**로 접는다 → 411일이 59주가 되고 → 59 >= 40 →
#   **"데이터 충분" 통과**. 얇아서 접은 계열이, 접었다는 이유로 충분해졌다(패턴 H — 가드의 분모가
#   정보가 아니라 달력이었다).
#
# 실측 피해(창 2024-05-31~2025-07-14 · IV=violence_count):
#   korean_peninsula  2건/2일  ← 북한 가설 71건이 여기로 라우팅 → 23건이 Granger 실행 → 14건이 '상관' 등급
#   north_korea       7건/6일
#   taiwan_strait     1건/1일  ← `taiwan_strait × TSM` 등록 쌍이 이 위에 있다
#   (나머지 9개 권역은 전부 13일 이상 — 이 문턱에 걸리지 않는다. hormuz 13 · sahel 364 · ukraine 376)
#
# 이 값은 새 숫자가 아니다 — 엔진이 이미 `nonzero < 10`을 "일별 검정하기엔 너무 얇다"고 적어놓고
# **집계 전환**에만 썼다. 그 판단을 **검정 거부**로 승격한 것이다. 낮추면 위 결합이 되살아난다.
min_informative_days: 10   # 창 내 '사건이 1건 이상 있는 날'이 이 미만이면 InsufficientInformationError

# ── 수집 커버리지 게이트 (B01 수리, 2026-07-14) ────────────────────────────
# 배경: reindex(fill_value=0.0)가 "수집이 없던 날"과 "사건이 0건인 날"을 같은 0으로
#   만들었다. 실측(2026-07-14): 24개월 창 731일 중 전역 이벤트가 1건이라도 있는 날은
#   399일뿐 — 332일(45.4%)이 수집 공백이고, 그중 2025-08~2026-03은 **8개월 통짜 구멍**이다.
#   그 구멍이 전부 "전쟁 없음"으로 검정에 투입됐다.
#
# 진짜 0과 결측을 가르는 신호: **전역 이벤트 수**. 밀집 구간엔 매일 수백~수천 건이
#   들어온다. 어느 날 전 세계 이벤트가 0건이라면 그날 세계가 평화로웠던 게 아니라
#   **그날 수집이 없었던 것**이다. 그 날은 NaN으로 남기고, 수집된 날에 이 지역만
#   이벤트가 없으면 그것은 진짜 0이다.
# 수집일 판정 문턱 (B01 위원회 2026-07-14 — 반박석 적발, 패턴 E)
# '전역 이벤트 ≥1건이면 수집된 날'로 잡았더니 가드가 자기 병을 다시 만들었다:
#   수집일 444일 중 전역 <10건인 날 19일 · <100건인 날 48일 (정상일 일평균 625건).
#   전역 3건 들어온 날을 "수집 정상"으로 확정하면 그날 8개 지역의 0이 진짜 0으로 주조된다.
# → 절대 문턱이 아니라 **정상 수집일 중앙값 대비 상대 문턱**.
coverage_min_ratio: 0.20   # 창 내 일별 전역 건수의 중앙값 × 0.20 미만인 날 = 부분 수집 = 결측

max_missing_share: 0.30    # 검정 창에서 결측(수집 공백)이 이 비율을 넘으면 검정하지 않고 **던진다**
                           #   0건 반환이 아니라 예외 — "관계 없다"와 "못 쟀다"는 다른 사실이다.
                           #   0.30 근거: 관측 70%면 lag 5일 검정의 유효 표본이 남는다. 상향 시
                           #   위조가 아니라 결측이 늘 뿐이지만, 시계열 연속성이 끊겨 lag 해석이
                           #   무의미해진다(dropna가 비연속 관측을 인접한 것처럼 붙인다).

# 유의성 임계 (p-value)
p_verified: 0.05    # VERIFIED (선행성) 판정 상한
p_partial: 0.15     # PARTIAL (상관·경향성) 판정 상한
p_extreme_verified: 0.05   # 극단(P90) 검정 유의 임계

# ── 검정력 (B25 수리, 2026-07-14) ─────────────────────────────────────────────
# "못 쟀다"와 "쟀고 관계없었다"를 가르는 계기. 이 둘이 같은 값이면(구 코드: 둘 다 PENDING)
# 못 잰 것이 관계 없는 것으로 읽힌다 — **그 바꿔치기가 B01의 정의였다.**
#
# ⚠️ 두 상수는 **결과를 보기 전에** 정한다. 결과를 보고 고르면 그 자체가 forking path다
#    ("유의하니까 효과가 컸다고 하자"). 그래서 코드가 아니라 설정에 박는다.

f2_realistic: 0.0045
# 사전 선언한 **현실적 효과크기**(Cohen's f²). 지정학 이벤트가 익일 시장 수익률
# **분산의 약 0.45%**를 설명한다는 가정. 근거: B01 위원회 방법론석(2026-07-14) —
# MDE lag1 ΔR²=3.1%(n=246) 실측에서 역산. 이보다 큰 효과를 가정하면 검정력이
# 부풀고, 작게 잡으면 모든 검정이 UNDERPOWERED가 된다.
#
# 실측 검정력 (lag=1, alpha=0.05):
#     n=  40 → 0.070      n= 246 → 0.182      n=1000 → 0.563
#     n=  80 → 0.091      n= 411 → 0.274      n=1750 → 0.800  ← 80%에 필요한 표본(≈6.9년)
# **현재 최대 창(411일)에서도 0.274다.** 그리고 그 창의 MDE는 f²=0.0192 —
# 현실적 효과의 **4배**. 즉 **잡을 수 있는 것은 현실에 없는 크기의 효과뿐이다.**

power_floor_for_rejection: 0.50
# 이 미만이면 비유의를 **기각(REJECTED)으로 주장할 수 없다** → UNDERPOWERED.
# 0.50 근거: 동전보다 나아야 "못 잡은 것"을 "없는 것"으로 읽을 최소 자격이 생긴다.
# (관례적 0.80은 이 엔진의 어떤 창에서도 도달 불가 — 그 사실 자체를 상태로 드러낸다)
#
# ⚠️ 이 값을 낮춰서 REJECTED를 늘리고 싶은 유혹이 생기면, 그게 정확히
#    "게이트를 통과하려고 게이트를 옮기는 것"이다. 낮추려면 위원회를 소집하라.

# episodic 정책행위 계열 — 선형 Granger 부적합 판정 (위원회 2026-07-08)
# 판정 신호는 source_type(데이터 소스 설계 시점에 선언되는 이벤트 클래스)이다.
# 형태 프로브(과분산·0-달 비율)는 캘리브레이션에서 기각됨: ACLED 계열이 수집 배치
# 아티팩트 탓에 미사일보다 과분산(var/mean 200~3747 vs 6.1) — 판별력 없음.
#
# ⚠️ [D2 위원회 2026-07-14 — 기각 사유 소멸, 재측정 필요] 위 "수집 배치 아티팩트"는
# 그날 오전 B01 위원회가 디듑한 event_archive ×1.9 이중 적재(304,581→249,438행)였다.
# 그 사유가 오늘 삭제됐다. 디듑된 DB + 오늘 사전선언된 신규 IV(violence_count·fatalities,
# 구 severity 합산 IV는 은퇴)로 재측정한 결과(창 2024-05-31~2025-07-14, 8개 등록쌍):
#   ukraine       violence_count var/mean=31.97 fatalities=87.90 (zero_share 0.08~0.09)
#   middle_east   violence_count var/mean=36.63 fatalities=87.97 (zero_share 0.03~0.05)
#   bab_el_mandeb violence_count var/mean= 1.50 fatalities= 6.08 (zero_share 0.03~0.16)
#   나머지 5쌍(korean_peninsula·north_korea·taiwan_strait·east_china_sea·malacca)은
#   해당 창의 ACLED 실사건이 0~90건뿐이라 var/mean이 표본부족으로 자명하게 낮다(~1.0~3.0).
#   CNS 미사일(north_korea, source_type=missile_test) 대조군: 같은 창 var/mean=1.27(n=7건,
#   불안정) · 활동기(2022-01~2024-11) var/mean=1.73, zero_share=0.938~0.985.
# 디듑 전(백업 DB) 대비 과분산은 축소됐으나(예: ukraine fatalities 150.05→87.90,
# violence_count 92.35→31.97) **소멸하지 않았다** — 실전 분쟁권(ukraine·middle_east)은
# 여전히 미사일 대조군 대비 var/mean 약 20~60배. 다만 디듑 전엔 이 프로브가 8개 권역
# 전부를 "200~3747" 대에 뭉갰던 반면, 디듑 후엔 실전쟁권(30~90) > 저강도(bab_el_mandeb,
# 1.5~6) > 정책행위/공백권(~1~3)의 **실측 강도와 일치하는 단조 구배**가 나타난다 —
# 이전엔 오염이 모든 권역을 균질하게 부풀려 판별력이 없었던 것이고, 지금은 서로 다른
# 진짜 과정(연속 무력분쟁 vs 희소 정책행위)을 구분하는 신호로 보인다.
# → [판단필요] 프로브 재도입 여부는 의장 판단(D2위원회 2026-07-14 보고, 배선 미실시).
# 의미론 판정은 쿼리별 튜닝이 불가능한 사전선언(북한 특례 아님 — 어느 나라든 적용).
episodic_policy_source_types: ["missile_test"]  # 단일 행위자의 의도적 정책 행위 계열
episodic_dominance_ratio: 0.8   # A-1 필터 후 표본에서 이 비율 이상이면 episodic 판정

# 분석 기간
lookback_months: 24        # Granger 이벤트 시계열 조회 기간 (개월)
# ⚠️ 확대 금지 (평가 위원회 2026-07-06, 3위원 만장 기각). 북한 미사일 sparse 검정을
#    위해 24→60 확대가 제안됐으나 통계적 착시로 판명:
#    ① 창 종속 sparse-weekly 스위치가 꺼져 식별이 오히려 약해짐(correlation.py 참조:
#       24mo=비제로4일→주간보호, 60mo=67일→일별노출, 96%가 0인 계열).
#    ② 창별 건수표를 보고 값을 고르는 것은 8-F 금지 window-selection p-해킹.
#    ③ 진짜 병목은 stale(CNS 2024-11 정체)이지 창 크기 아님 — lookback으로 못 고침.
#    미사일은 체제변수(2018=0·2022=69)라 선형 Granger 부적합 → 구조적 논증 라우팅 대상.
