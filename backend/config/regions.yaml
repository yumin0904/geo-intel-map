# regions.yaml — 자체 지역(region) 정의
#
# Cascade 룰의 trigger/response는 좌표가 아니라 "지역 코드"로 매칭된다.
# 예: 호르무즈 해협 근처에서 발생한 분쟁 이벤트 → region_code="hormuz".
#
# bbox는 [min_lon, min_lat, max_lon, max_lat] 순서 (GeoJSON 경도-우선 관례).
# center는 시각화에서 시장(market) 응답처럼 좌표 없는 이벤트를 앵커링할 대표점 [lon, lat].
#
# 정치외교학 연결: 각 region은 SLOC(해상교통로) 통제·자원무기화 이론의 분석 단위다.

hormuz:
  name: "호르무즈 해협"
  # 이란-오만-UAE 사이 해협 + 걸프 진입부. 인근 분쟁 이벤트를 트리거로 포착하기 위해 넓게 잡음.
  bbox: [53.0, 23.0, 60.0, 30.0]
  center: [56.5, 26.5]
  theory: "Resource Weaponization (Hirschman 1945) — 글로벌 원유 해상운송의 약 20%가 통과"

bab_el_mandeb:
  name: "바브엘만데브 해협"
  bbox: [42.0, 11.0, 45.5, 14.5]
  center: [43.3, 12.6]
  theory: "SLOC 통제 — 수에즈-홍해 경로의 남쪽 관문, 후티 위협 노출"

malacca:
  name: "말라카 해협"
  bbox: [98.0, 1.0, 104.0, 6.5]
  center: [100.5, 3.0]
  theory: "Mahan 해양력 — 동아시아 에너지 수입의 핵심 길목(말라카 딜레마)"

taiwan_strait:
  name: "대만 해협"
  bbox: [118.0, 22.0, 122.0, 26.0]
  center: [120.0, 24.0]
  theory: "A2/AD·제1열도선 — 반도체 공급망 집중과 결합된 군사 긴장축"

south_china_sea:
  name: "남중국해"
  # 베트남·필리핀·말레이시아·중국에 둘러싸인 분쟁 해역. 9단선 vs UNCLOS 대립 핵심 공간.
  bbox: [105.0, 3.0, 122.0, 22.0]
  center: [113.0, 12.0]
  theory: "Gray Zone Strategy — 도서 군사화·해상민병대를 통한 현상변경 (패권경쟁 핵심 마찰점)"

north_korea:
  name: "북한"
  # 탄도미사일 발사장(함흥·원산 등) 포함 DPRK 전역. 미사일 테스트 트리거 포착.
  # [행위자형 region] 1차 배정은 actor/country 매치(region_for_event) — bbox는 좌표만 있는 소스(FIRMS 등) 폴백.
  #   ACLED는 북한 도발을 접촉점(판문점·DMZ 남측 37.96N)에 좌표코딩하므로 발생지 bbox만으로는 원리적으로 누락.
  #   남위 경계 38.0: 서울(37.52~37.60N) 월경 오염 수리 — geo-os 판례 20260709-nk-region-bbox-contamination
  bbox: [124.0, 38.0, 130.5, 42.7]
  center: [127.0, 40.0]
  actor_match: ["North Korea"]     # actor1/actor2 부분 문자열 매치 (예: "Military Forces of North Korea (2011-)")
  country_match: ["North Korea"]   # ACLED country 필드 정확 매치
  theory: "Compellence / Nuclear Deterrence — 북한의 미사일 도발은 확장억제 신뢰성 시험이자 경제 압박 수단"

suez:
  name: "수에즈 운하"
  # 운하 본체 + 북부 홍해 접근로. 에버기븐 좌초(2021) 및 후티 우회 영향권.
  bbox: [31.5, 28.0, 34.5, 32.5]
  center: [32.5, 30.5]
  theory: "SLOC Interdiction — 세계 무역의 약 12~15%가 통과. 차단 시 아시아↔유럽 운임 즉각 급등"

ukraine:
  name: "우크라이나"
  # 러시아-우크라이나 교전 지역 전체. 오데사(흑해 곡물항) 포함.
  bbox: [22.0, 44.0, 40.5, 52.5]
  center: [31.0, 48.5]
  theory: "Resource Weaponization — 우크라이나+러시아가 세계 밀 수출의 약 28% 담당. 전쟁이 식량 안보 무기로 전환"

middle_east:
  name: "중동"
  # 레반트·걸프·이라크·시리아 포함 광역 중동. 호르무즈·바브엘만데브는 별도 region으로 분리 관리.
  bbox: [35.0, 15.0, 65.0, 37.0]
  center: [45.0, 26.0]
  theory: "Security Dilemma — 이란-사우디 대리전, 이스라엘-팔레스타인, 시아-수니 축이 중첩된 복합 분쟁 공간"

korean_peninsula:
  name: "한반도"
  # 남북한 전체 + DMZ. 북한 도발 및 한미 연합훈련에 따른 한국 시장 리스크 반영.
  # country_match: 제주(33.4998N — bbox 하한 33.5 밖 0.0002도)·독도(경도 130.5 초과) 이벤트가
  #   east_china_sea로 낙하하던 경계 정밀도 갭을 발생국 신호로 보완 (실측 183건, 판례 동일).
  bbox: [124.0, 33.5, 130.5, 43.0]
  center: [127.5, 37.5]
  country_match: ["South Korea"]
  theory: "Extended Deterrence — 미국 핵우산의 신뢰성 변동이 한국 리스크 프리미엄(코리아 디스카운트)으로 즉각 전이"

east_china_sea:
  name: "동중국해"
  # 중국 동안·대만 북방·일본 규슈·오키나와·한반도 남단을 아우르는 해역.
  # 센카쿠/댜오위다오 분쟁, 중국 ADIZ 선포(2013) 등 A2/AD 마찰 공간.
  bbox: [118.0, 24.0, 132.0, 40.0]
  center: [125.0, 30.0]
  theory: "A2/AD + Forward Deployment — 중일 영토 분쟁과 미 제7함대 전진배치가 교차하는 제1열도선 북방 구역"

# ── 이론별 적용 가능 지역 (theory_geo_filters) ──────────────────────
# 이 목록의 이론 태그는 해당 지역의 이벤트에만 Theory Panel 카드를 표시한다.
# 내륙 분쟁(미얀마, 우크라이나 등)에서 해양 이론이 오표시되는 것을 방지.
# 프론트엔드 TheoryPanel.js THEORY_DB의 geo_filter 필드와 항상 동기화할 것.
#
# A2AD_applicable_regions: A2/AD는 해양 접근거부 전략 — 내륙 분쟁과 무관.
theory_geo_filters:
  A2AD:
    - taiwan_strait
    - south_china_sea
    - east_china_sea
  sloc:
    - taiwan_strait
    - south_china_sea
    - east_china_sea
    - hormuz
    - bab_el_mandeb
    - suez
    - malacca
