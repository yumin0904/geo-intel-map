# 역사적 비교 사례 DB
# 8단계 추론 Step 3에서 현재 이벤트와 유사한 역사 패턴을 매칭할 때 사용.
# trigger_keywords: 이벤트의 title/description과 매칭할 키워드 목록
# sector_tags: 5대 섹터 태그 (CLAUDE.md 기준)
# outcome_summary_ko: 실제 결과 요약 (한국어)
# theory_ref: 관련 이론 slug (theory_library.yaml name과 일치)

cases:

  # ── 해양 초점주의 & SLOC ──────────────────────────────────────────

  - id: cs_gulf_tanker_war_1984
    title_ko: "1984 걸프 유조선 전쟁"
    title_en: "Gulf Tanker War (1984-1988)"
    date: "1984-03-01"
    region: hormuz
    sector_tags: [maritime, energy]
    trigger_keywords: [tanker, gulf, strait, oil, shipping]
    actors: ["Iraq", "Iran"]
    outcome_summary_ko: >
      이라크-이란 전쟁 중 양측이 페르시아만 유조선을 공격. 최소 546척 공격, 해상 보험료
      급등, 미국 해군 호위 작전(Earnest Will) 개시. 호르무즈 봉쇄 위협이 유가 급등과
      미국의 직접 개입을 불러온 최초 사례.
    theory_ref: resource_weaponization
    lessons_ko: "해상 초크포인트 위협 → 강대국 개입 패턴의 원형."

  - id: cs_somali_piracy_2008
    title_ko: "2008 소말리아 해적 급증"
    title_en: "Somali Piracy Crisis (2008-2012)"
    date: "2008-11-01"
    region: aden_gulf
    sector_tags: [maritime, gray_zone]
    trigger_keywords: [piracy, somalia, hijack, vessel, ransom, aden]
    actors: ["Somalia", "Multinational Naval Forces"]
    outcome_summary_ko: >
      소말리아 내전·어업 붕괴로 해적 활동 폭증. 2011년 피크 시 736명 인질, EU NAVFOR·
      나토·중국·인도 등 다국적 해군 작전. 선박 우회로 변경으로 보험료 및 운임 급등.
      국가 실패와 비국가 행위자의 SLOC 위협 사례.
    theory_ref: hybrid_warfare
    lessons_ko: "국가 실패 → 비국가 행위자의 전략적 공간 점령."

  - id: cs_houthi_red_sea_2023
    title_ko: "2023 후티 홍해 공격"
    title_en: "Houthi Red Sea Attacks (2023-)"
    date: "2023-11-19"
    region: red_sea
    sector_tags: [maritime, gray_zone, energy]
    trigger_keywords: [houthi, red sea, bab el mandeb, drone, missile, container]
    actors: ["Houthis (Yemen)", "Israel", "USA", "UK"]
    outcome_summary_ko: >
      가자 전쟁 연대 명목으로 후티가 홍해·바브엘만데브 통과 선박에 드론·미사일 공격.
      선박 우회로(희망봉) 이용 급증으로 운송비 3~4배, 수에즈 운하 통항량 50% 감소.
      미·영 합동 공습(Prosperity Guardian)에도 공격 지속.
    theory_ref: gray_zone_strategy
    lessons_ko: "비국가 행위자의 SLOC 차단으로 글로벌 공급망 교란 — 회색지대의 비대칭성."

  # ── 에너지 지정학 ─────────────────────────────────────────────────

  - id: cs_russia_ukraine_gas_2006
    title_ko: "2006 러-우크라이나 가스 분쟁"
    title_en: "Russia-Ukraine Gas Dispute (2006)"
    date: "2006-01-01"
    region: ukraine
    sector_tags: [energy]
    trigger_keywords: [gas, pipeline, ukraine, russia, energy, supply]
    actors: ["Russia", "Ukraine", "EU"]
    outcome_summary_ko: >
      러시아 가스프롬이 유럽 수출 가스 공급을 차단. EU 국가들도 간접 피해. 유럽의
      러시아 에너지 의존도 취약성 노출. 이후 Nord Stream 1·2 논쟁으로 이어짐.
      자원 무기화(Resource Weaponization)의 교과서 사례.
    theory_ref: resource_weaponization
    lessons_ko: "에너지 공급 차단이 외교적 강압 수단으로 전환되는 전형적 패턴."

  - id: cs_nord_stream_sabotage_2022
    title_ko: "2022 노르트스트림 파괴"
    title_en: "Nord Stream Pipeline Sabotage (2022)"
    date: "2022-09-26"
    region: baltic_sea
    sector_tags: [energy, gray_zone]
    trigger_keywords: [nord stream, pipeline, explosion, sabotage, baltic, gas]
    actors: ["Unknown", "Russia", "Ukraine", "USA (alleged)"]
    outcome_summary_ko: >
      발트해 수중에서 Nord Stream 1·2 파이프라인 동시 폭발. 러-우전쟁 중 유럽 에너지
      인프라의 취약성 노출. 범인 미확인(러·우·미 모두 의혹). EU의 LNG 전환 가속화 촉진.
    theory_ref: hybrid_warfare
    lessons_ko: "주요 에너지 인프라가 비공개 회색지대 작전의 표적이 될 수 있음."

  # ── 기술 패권 & 보이지 않는 인프라 ──────────────────────────────

  - id: cs_huawei_ban_2019
    title_ko: "2019 화웨이 5G 금지"
    title_en: "Huawei 5G Ban (2019)"
    date: "2019-05-15"
    region: global
    sector_tags: [techno]
    trigger_keywords: [huawei, 5g, semiconductor, ban, chip, telecom]
    actors: ["USA", "China", "UK", "EU"]
    outcome_summary_ko: >
      미국이 화웨이를 Entity List에 등재, 미국 부품·기술 수출 금지. 영국·호주·캐나다 동참.
      글로벌 5G 인프라가 지정학적 분쟁의 핵심 영역으로 부상. 기술 블록화(Decoupling)
      논쟁의 시작점.
    theory_ref: techno_nationalism
    lessons_ko: "통신 인프라가 국가안보 이슈로 전환 — Techno-nationalism의 실증."

  - id: cs_chips_act_2022
    title_ko: "2022 미국 반도체법(CHIPS Act)"
    title_en: "US CHIPS and Science Act (2022)"
    date: "2022-08-09"
    region: global
    sector_tags: [techno, energy]
    trigger_keywords: [chips, semiconductor, tsmc, fab, intel, supply chain, taiwan]
    actors: ["USA", "Taiwan", "South Korea", "China"]
    outcome_summary_ko: >
      280억 달러 반도체 보조금, 미국 내 첨단 팹 유치. TSMC 아리조나, 삼성 텍사스 투자
      확대. 중국 반도체 제재(FDPR) 강화와 맞물려 반도체 공급망 재편 가속화.
    theory_ref: weaponized_interdependence
    lessons_ko: "공급망 집중 취약성이 정책적 탈동조화(Decoupling) 압력으로 이어지는 패턴."

  # ── 인도-태평양 군사 대치 ─────────────────────────────────────────

  - id: cs_taiwan_strait_crisis_1996
    title_ko: "1996 대만해협 미사일 위기"
    title_en: "Third Taiwan Strait Crisis (1996)"
    date: "1996-03-08"
    region: taiwan_strait
    sector_tags: [indo_pacific]
    trigger_keywords: [taiwan, strait, pla, missile, exercise, carrier, china]
    actors: ["China", "Taiwan", "USA"]
    outcome_summary_ko: >
      중국 PLA가 대만 총통 선거 전 미사일 훈련 실시. 미국이 항공모함 2척 파견으로
      대응. 중국의 강압외교(Coercive Diplomacy)가 미국의 군사 개입 의지를 확인시킨
      사례. 이후 미군 대만 관계법(TRA) 재해석 논쟁 촉발.
    theory_ref: a2ad_strategy
    lessons_ko: "대만해협 위기의 원형 — 강압 → 미국 억제 → 현상 유지 패턴."

  - id: cs_south_china_sea_arbitration_2016
    title_ko: "2016 남중국해 중재 판결"
    title_en: "South China Sea Arbitration (2016)"
    date: "2016-07-12"
    region: south_china_sea
    sector_tags: [indo_pacific, maritime]
    trigger_keywords: [south china sea, arbitration, unclos, spratly, reef, island, nine-dash]
    actors: ["China", "Philippines", "USA", "Vietnam"]
    outcome_summary_ko: >
      PCA(상설중재재판소)가 중국의 9단선 주장을 UNCLOS 위반으로 판결. 중국은 판결 거부.
      이후 중국의 인공섬 군사화 가속. FONOP(항행의 자유 작전) 빈도 증가. 국제법과
      강대국 실력 행사의 충돌 사례.
    theory_ref: a2ad_strategy
    lessons_ko: "국제법 판결이 강대국 행동을 직접 제약하지 못하는 한계 — 힘의 정치 vs. 규범."

  # ── 회색지대 & 비전통 안보 ───────────────────────────────────────

  - id: cs_crimea_annexation_2014
    title_ko: "2014 크림반도 병합"
    title_en: "Russia's Annexation of Crimea (2014)"
    date: "2014-02-27"
    region: ukraine
    sector_tags: [gray_zone, indo_pacific]
    trigger_keywords: [crimea, ukraine, russia, annexation, little green men, hybrid]
    actors: ["Russia", "Ukraine", "EU", "USA"]
    outcome_summary_ko: >
      정체 불명 특수부대(Little Green Men)가 크림반도 장악. 주민투표 후 병합.
      NATO의 집단방위 딜레마 노출. 서방 제재 시작. 하이브리드전의 표준 사례로 학계 정착.
      2022년 전면 침공의 서막.
    theory_ref: hybrid_warfare
    lessons_ko: "전쟁 선언 없는 영토 병합 — 하이브리드전의 교과서."

  - id: cs_pelosi_taiwan_visit_2022
    title_ko: "2022 펠로시 대만 방문"
    title_en: "Pelosi Taiwan Visit (2022)"
    date: "2022-08-02"
    region: taiwan_strait
    sector_tags: [indo_pacific, gray_zone]
    trigger_keywords: [pelosi, taiwan, pla, exercise, blockade, carrier, missile]
    actors: ["USA", "China", "Taiwan"]
    outcome_summary_ko: >
      낸시 펠로시 미 하원의장 대만 방문에 대응해 중국 PLA가 대만 주변 6개 구역에서
      대규모 훈련. 탄도미사일 일부가 일본 EEZ 통과. 이후 중국의 대만 포위 훈련이
      정례화되는 계기.
    theory_ref: a2ad_strategy
    lessons_ko: "미 고위 인사 방문이 중국 군사 행동의 트리거가 되는 패턴 확인."
